services:
  # ── 1. Ollama server ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      # Model lưu vào volume, tồn tại giữa các lần restart
      # Lần đầu pull qwen3:4b ~2.5GB, từ lần 2 trở đi dùng cache
      - ollama_data:/root/.ollama
    environment:
      # Giữ model trong VRAM để tránh cold start ~45 giây giữa các lượt demo.
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_FLASH_ATTENTION: "true"
      OLLAMA_CONTEXT_LENGTH: "4096"
    # CPU-safe default: works on machines without NVIDIA GPU setup.
    # For NVIDIA GPU, use: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 12  # chờ tối đa 60s cho Ollama khởi động

  # ── 2. Pull Qwen model vào volume (chạy một lần rồi thoát) ─────────────────
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy  # đợi Ollama thực sự sẵn sàng
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    # Kiểm tra model đã có chưa, tránh re-download khi docker compose up lần 2
    command:
      - |
        if ollama list | grep -q '${QWEN_MODEL:-qwen3:4b}'; then
          echo 'Model ${QWEN_MODEL:-qwen3:4b} already exists, skipping pull.';
        else
          echo 'Pulling ${QWEN_MODEL:-qwen3:4b}...';
          ollama pull ${QWEN_MODEL:-qwen3:4b};
        fi;
        echo 'Warming up ${QWEN_MODEL:-qwen3:4b}...';
        ollama run ${QWEN_MODEL:-qwen3:4b} 'Chỉ trả lời đúng một từ: OK' >/dev/null;
        echo 'Model warm-up complete.'
    volumes:
      - ollama_data:/root/.ollama  # dùng chung volume với ollama service

  # ── 3. RAG chatbot web app ──────────────────────────────────────────────────
  rag-chatbot:
    build: .
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      QWEN_MODEL: ${QWEN_MODEL:-qwen3:4b}
      VECTORSTORE_PATH: vectorstore/legal_vectorstore.json
    volumes:
      - ./vectorstore:/app/vectorstore:ro
    restart: unless-stopped

volumes:
  ollama_data:
    # Volume giữ toàn bộ model Qwen đã pull
    # docker compose down KHÔNG xóa volume này
    # Muốn xóa hẳn để pull lại: docker compose down -v
